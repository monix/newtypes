name: Renovate

on:
  workflow_dispatch:
  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: "0 9 * * 1"

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Renovate
        uses: renovatebot/github-action@v46.1.14
        with:
          configurationFile: .github/renovate-config.js
          token: ${{ secrets.RENOVATE_TOKEN }}
        # env:
        #   LOG_LEVEL: debug
