name: build

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags: ["v[0-9]+*"]

jobs:
  tests:
    name: Unit tests / JVM ${{ matrix.java }}
    strategy:
      fail-fast: false   
      matrix:
        os: [ubuntu-latest]
        java: [17, 21]
        command: ["ci-test-all"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          cache: 'sbt'
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: sbt ${{ matrix.command }}
        run: |
          ./sbt -J-Xmx6144m ${{ matrix.command }}

  doc-tests:
    name: Docs tests 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          cache: 'sbt'
          java-version: 17
          distribution: 'temurin'
      - name: sbt ci-doc
        run: |
          ./sbt -J-Xmx6144m ci-doc
  
  all_tests:
    name: All Tests
    needs: [ tests, doc-tests ]
    runs-on: ubuntu-latest
    steps:
      - name: Ack
        run: |
          echo "All done."

  #-----------------------------------------------------------------------------------
  # Publishing tasks
  #-----------------------------------------------------------------------------------

  publish_sonatype:
    name: Publish to Sonatype
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [ all_tests ]
    strategy:
      fail-fast: true      
      max-parallel: 1
      matrix:
        command: [ci-release]

    runs-on: ubuntu-20.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          cache: 'sbt'
          java-version: 17
          distribution: 'temurin'

      - name: Install GnuPG2
        run: |
          ./.github/scripts/setup-pgp

      - name: .github/scripts/release
        run: |
          .github/scripts/release
        env:
          PGP_KEY_HEX: ${{ secrets.PGP_KEY_HEX }}
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          PUBLISH_STABLE_VERSION: true

  publish_docs:
    name: Publish Website
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [ publish_sonatype ]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          cache: 'sbt'
          java-version: 17
          distribution: 'temurin'

      - name: Generate Scaladoc website
        run: ./sbt -J-Xmx6144m ci-doc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/scala-3.3.7/unidoc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
